<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timesheet App</title>
    <!-- Modern Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar-custom">
    <a href="/" class="navbar-brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        Synapse Time
    </a>
    {% if session.get('user') %}
    <div class="nav-actions">
        <span style="font-weight: 500; color: var(--text-muted);">Hi, {{ session.get('user') }}</span>
        {% if session.get('role') == 'admin' %}
            <a href="/admin" class="btn-custom" style="padding: 0.5rem 1rem; background: var(--text-main);">Dashboard</a>
        {% else %}
            <a href="/" class="btn-custom" style="padding: 0.5rem 1rem; background: var(--text-main);">Timesheet</a>
        {% endif %}
        <a href="/logout" class="btn-danger">Logout</a>
    </div>
    {% endif %}
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<!-- Toast for notifications -->
<div class="toast-container" id="toastContainer"></div>

<script>
function showToast(message) {
    const container = document.getElementById("toastContainer");
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.textContent = message;
    container.appendChild(toast);
    
    // Animate in
    setTimeout(() => {
        toast.classList.add("show");
    }, 10);

    // Remove after 3s
    setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}
</script>
</body>
</html>
