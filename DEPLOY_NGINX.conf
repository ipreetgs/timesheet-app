# Nginx configuration for Ubuntu Server
# Place this file in /etc/nginx/sites-available/timesheet
# Then run: sudo ln -s /etc/nginx/sites-available/timesheet /etc/nginx/sites-enabled
# And: sudo systemctl restart nginx

server {
    listen 80;
    
    # REPLACE this with your server IP address (e.g. 192.168.1.50) or domain name
    server_name _; 

    location / {
        include proxy_params;
        # Forwards traffic strictly to the Gunicorn unix socket
        proxy_pass http://unix:/var/www/timesheet/timesheet.sock;
    }
}
